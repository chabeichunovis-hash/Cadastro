<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h2>Cadastre-se</h2>
    </header>
    <main> 
        <form action="www.google.com" method="get">

            <div class="cadastro">
        <fieldset>
            <legend>  Dados Pessoais</legend>
            <label for = "nome">Nome:</label>
            <input required type="text" name="nome">
            <br><br>
            <label for="email">E-mail:</label>
            <input required type = "email" name="email">
            <br><br>
            <label for="senha">Senha:</label>
            <input required type = "password" name="senha">
            <br><br>
            <label for="cPF">CPF:</label>
            <input type="number" name="cPF">
            <br><br>
            <label for="data">Data de nascimento:</label>
            <input type="date" name="data">
            <br><br>
            <label for="perfil">Fale sobre si mesmo</label>
            <br>
            <textarea name="perfil" cols="28" rows="8"></textarea>
            <br><br>
            <label for="estado">Estado</label>
            <select name="estado">
                <option value="Sp">São Paulo</option>
                <option value="Rj">Rio de Janeiro</option>
                <option value="Ba">Bahia</option>
                <option value="Am">Amazonas</option>
                <option value="Rs">Rio Grande do Sul</option>
            </select>
            <br><br>
            <label for="cidade">Cidade</label>
            <select name="cidade"> 
                <option value="sp">Sao Paulo</option>
                <option value="rj">Rio de Janeiro</option>
                <option value="ssa">Salvador</option>
                <option value="Ma">Manaus</option>
                <option value="pa">Porto Alegre</option>
            <select>
            <br><br>
            <input required type="radio" name="genero" value="m">Masculino
            <input required type="radio" name="genero" value="f">Feminino
        </fieldset>
        </div>
        <br>
        <input required type="checkbox">Aceito os termos
        <br><br>
        <input type="submit" name="Enviar">
        </form>
    </main>
    <br>
    <footer>
        Todos os direitos reservados
    </footer>
    
</body>
</html>
